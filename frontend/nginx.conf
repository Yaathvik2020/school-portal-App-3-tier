server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api{
        set $upstream_dynamic school-admin-api-service;
        proxy_pass http://$upstream_dynamic:3500/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
