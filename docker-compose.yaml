version: '3.9'

services:
  db:
    container_name: mysql-container
    image: mysql:8.0.40-oraclelinux9
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: school
    networks:
      - product-school-network
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build: ./backend
    ports:
      - "3500:3500"
    environment:
      host: db
      user: root
      password: mysql123
      database: school
    networks:
      - product-school-network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Use empty args for nginx reverse proxy (matches production setup)
        # nginx will proxy /student -> school-admin-service:3500
        # nginx will proxy /teacher -> school-admin:3500
        - REACT_APP_API_BASE_URL=
    container_name: frontend
    networks:
      - product-school-network
    ports:
      - "88:80"
    depends_on:
      backend:
        condition: service_started
    

volumes:
  mysql-data:
  
networks:
  product-school-network:
    driver: bridge
